esphome:
  name: esp-water-meter
  friendly_name: ESP water meter
  platformio_options:
    board_build.flash_mode: dio

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret fallback_password
  fast_connect: true
  post_connect_roaming: false

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"

logger:
  id: component_logger
  level: DEBUG
  baud_rate: 115200

captive_portal:

web_server:
  port: 80
  version: 3

external_components:
  - source: github://SzczepanLeon/esphome-components@39182474b47b5cdcd0f38b6829bd0b3518acd919 # main branch at 2026-04-15
    components: [wmbus_meter, wmbus_radio, wmbus_common]

spi:
  mosi_pin: GPIO18
  miso_pin: GPIO23
  clk_pin:  GPIO19

wmbus_radio:
  radio_type: CC1101
  cs_pin:     GPIO5
  irq_pin:    GPIO14

wmbus_meter:
  - id: water_meter
    meter_id: !secret meter_id
    type: hydrus
    key: !secret hydrus_aes_key

sensor:
  - platform: wmbus_meter
    parent_id: water_meter
    name: "Water total"
    field: "total_m3"
    accuracy_decimals: 3
    unit_of_measurement: "m³"
    device_class: "water"
    state_class: "total_increasing"
    icon: "mdi:water"
  - platform: wmbus_meter
    parent_id: water_meter
    name: "Water temperature"
    field: "flow_temperature_c"
    accuracy_decimals: 1
    unit_of_measurement: "C°"
    state_class: "measurement"
    icon: "mdi:temperature-celsius"
  - platform: wmbus_meter
    parent_id: water_meter
    name: "Water meter battery"
    field: "remaining_battery_life_y"
    accuracy_decimals: 5
    unit_of_measurement: "y"
    entity_category: "diagnostic"
    icon: "mdi:battery-clock-outline"

mqtt:
  broker: !secret broker_ip
  port: !secret broker_port
  client_id: DEVS_WMETER
  topic_prefix: ESP_WATER_METER
  username: !secret mqtt_username
  password: !secret mqtt_password

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
